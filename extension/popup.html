<!DOCTYPE html>

<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuiltByHuman</title>
  <link rel="preconnect" href="https://fonts.googleapis.com/">
  <link href="./popup_files/css2" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F9F8F6;
      --ink: #0E0E12;
      --ink2: #3D3D4E;
      --ink3: #8A8A9A;
      --border: #E4E4EC;
      --blue: #1A6CFF;
      --blue-dim: #EEF3FF;
    }
    body {
      width: 320px;
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--ink);
      padding: 0;
    }

    .header {
      background: white;
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--ink);
    }
    .logo span { color: var(--blue); }
    .badge {
      font-size: 10px;
      font-weight: 700;
      background: var(--blue-dim);
      color: var(--blue);
      padding: 3px 8px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .body { padding: 20px; }

    .label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink3);
      margin-bottom: 8px;
    }
    .url-box {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--ink2);
      word-break: break-all;
      line-height: 1.5;
      min-height: 44px;
      margin-bottom: 16px;
    }
    .url-box.empty { color: var(--ink3); font-family: 'Outfit', sans-serif; font-size: 13px; }

    .btn {
      width: 100%;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: -0.01em;
    }
    .btn:hover { background: #0F5AE8; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(26,108,255,0.3); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { background: #9DB8FF; cursor: not-allowed; transform: none; box-shadow: none; }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
    }
    .footer-link {
      font-size: 11px;
      color: var(--ink3);
      text-decoration: none;
      transition: color 0.15s;
    }
    .footer-link:hover { color: var(--blue); }

    .warning {
      background: #FFF7E6;
      border: 1px solid rgba(196,120,0,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: #C47800;
      line-height: 1.5;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">BuiltBy<span>Human</span></div>
    <div class="badge">◉ AI Detector</div>
  </div>

  <div class="body">
    <div class="label">Current Page</div>
    <div class="url-box" id="urlBox">Loading...</div>
    <div class="warning" id="warning" style="display:none">
      This page can't be scanned — it may be a browser internal page or a restricted URL.
    </div>
    <button class="btn" id="scanBtn" disabled="">Scan This Site →</button>
  </div>

  <div class="footer">
    <a href="https://builtbyhuman.app/" target="_blank" class="footer-link">builtbyhuman.app</a>
    <a href="https://builtbyhuman.app/educators" target="_blank" class="footer-link">🎓 For Educators</a>
  </div>

  <script src="./popup_files/popup.js"></script>


</body></html>
